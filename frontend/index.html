<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Master Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B132B',
                        accent: '#3B82F6',
                        accentHover: '#2563EB',
                        highlight: '#F97316',
                        highlightHover: '#EA580C',
                        textMain: '#F8FAFC',
                        textSub: '#FED7AA'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
</head>
<body class="bg-primary text-textMain min-h-screen font-sans">
    
    <!-- Top Nav -->
    <header class="border-b border-gray-700 p-4 flex justify-between items-center bg-opacity-50">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-r from-accent to-highlight p-2 rounded-lg">
                <i class="fas fa-microphone-lines text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider">TTS Master Studio Pro <span class="text-xs text-textSub ml-2 bg-gray-800 px-2 py-1 rounded">Free Edition</span></h1>
        </div>
        <div class="text-sm flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full inline-block animate-pulse"></span>
            HF API Key Status: OK
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        
        <!-- LEFT COLUMN -->
        <aside class="w-[35%] border-r border-gray-700 p-6 overflow-y-auto custom-scrollbar flex flex-col gap-6">
            
            <button id="uploadBtn" class="w-full bg-highlight hover:bg-highlightHover transition-all text-white font-bold py-3 px-4 rounded-lg shadow-lg flex justify-center items-center gap-2">
                <i class="fas fa-file-upload"></i> Upload Text File
            </button>
            <input type="file" id="fileInput" accept=".txt" class="hidden">

            <!-- Model Selection -->
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Model Selection</h3>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-gray-800">
                        <input type="radio" name="model" value="edge_tts" checked class="accent-highlight">
                        <span>Edge TTS (Microsoft) <span class="text-textSub text-xs ml-1">(Premium Free)</span></span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-gray-800">
                        <input type="radio" name="model" value="kokoro" class="accent-highlight">
                        <span>Kokoro</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-gray-800">
                        <input type="radio" name="model" value="piper" class="accent-highlight">
                        <span>Piper (Local)</span>
                    </label>

                </div>
            </div>

            <!-- Voice Config -->
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Voice Configuration</h3>
                <div class="flex gap-2 mb-3">
                    <button class="flex-1 bg-gray-800 hover:bg-gray-700 py-1 rounded text-sm active">Male</button>
                    <button class="flex-1 bg-gray-800 hover:bg-gray-700 py-1 rounded text-sm">Female</button>
                </div>
                
                <div class="flex gap-2 mb-3">
                    <select id="voiceSelect" class="flex-1 w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-accent">
                        <!-- Options populated by JS -->
                    </select>
                    <button id="addFavBtn" class="bg-gray-800 hover:bg-gray-700 text-yellow-500 px-3 rounded border border-gray-700 transition-colors" title="Add to Favorites">
                        <i class="fas fa-star"></i>
                    </button>
                </div>

                <div class="relative mb-3">
                    <i class="fas fa-search absolute left-3 top-2.5 text-gray-400"></i>
                    <input type="text" placeholder="Search voices..." class="w-full bg-gray-800 border border-gray-700 rounded py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-accent">
                </div>

                <div class="text-sm">
                    <span class="text-gray-400">Favorites:</span>
                    <div id="favoritesList" class="flex flex-wrap gap-2 mt-2">
                        <!-- Favorites populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Tuning -->
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Tuning & Effects</h3>
                
                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span>Speed</span>
                        <span id="speedVal">1.0x</span>
                    </div>
                    <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-accent">
                </div>

                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span>Pitch</span>
                        <span>1.0x</span>
                    </div>
                    <input type="range" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-accent">
                </div>

                <select class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-accent">
                    <option>Emotion: Storyteller</option>
                    <option>Emotion: Excited</option>
                    <option>Emotion: Serious</option>
                </select>
            </div>

            <div class="mt-auto grid grid-cols-2 gap-2">
                <button id="exportMp3Btn" class="bg-gray-800 hover:bg-gray-700 py-2 rounded text-sm"><i class="fas fa-download mr-1"></i> MP3</button>
                <button id="exportWavBtn" class="bg-gray-800 hover:bg-gray-700 py-2 rounded text-sm"><i class="fas fa-download mr-1"></i> WAV</button>
                <button id="exportSrtBtn" class="bg-gray-800 hover:bg-gray-700 py-2 rounded text-sm col-span-2"><i class="fas fa-closed-captioning mr-1"></i> Export SRT</button>
            </div>

        </aside>

        <!-- RIGHT COLUMN -->
        <main class="w-[65%] p-6 flex flex-col gap-6 bg-[#0a1024]">
            
            <!-- Workspace -->
            <div class="bg-gray-900 border border-gray-700 rounded-lg flex flex-col h-1/3 shadow-xl relative">
                <textarea id="textInput" class="w-full flex-1 bg-transparent p-4 resize-none focus:outline-none custom-scrollbar" placeholder="Paste up to 30,000 words here..."></textarea>
                <div class="border-t border-gray-700 p-2 flex justify-between text-xs text-gray-400 bg-gray-800 rounded-b-lg">
                    <span>Word Count: <span id="wordCount" class="text-textSub">0</span> / 30,000</span>
                    <span>Estimated Chunks: <span id="chunkCount" class="text-accent">0</span></span>
                </div>
            </div>

            <!-- Generate Button -->
            <button id="generateBtn" class="w-full bg-highlight hover:bg-highlightHover transition-all shadow-[0_0_15px_rgba(249,115,22,0.5)] py-4 rounded-xl text-xl font-bold tracking-wide group relative overflow-hidden">
                <span class="relative z-10"><i class="fas fa-bolt mr-2 text-yellow-300"></i> GENERATE SPEECH & SRT</span>
                <div class="absolute inset-0 h-full w-0 bg-white/20 transition-all duration-300 ease-out group-hover:w-full z-0"></div>
            </button>

            <!-- Audio Preview -->
            <div class="bg-gray-900 border border-gray-700 rounded-lg p-4 shadow-xl">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Audio Preview</h3>
                <div class="flex items-center gap-4">
                    <button id="playBtn" class="w-12 h-12 bg-accent rounded-full flex justify-center items-center hover:bg-accentHover transition-colors shadow-lg shadow-accent/30">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <div id="waveform" class="flex-1 cursor-pointer"></div>
                </div>
            </div>

            <!-- Previews -->
            <div class="flex gap-6 h-full min-h-[250px]">
                
                <!-- Capcut Preview -->
                <div class="flex-1 bg-gray-900 border border-gray-700 rounded-lg p-4 flex flex-col shadow-xl">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Visual Preview</h3>
                    <div class="flex-1 bg-black rounded-lg border-2 border-gray-800 relative flex justify-center items-center overflow-hidden">
                        <div class="w-[200px] h-full bg-gray-900 border-x border-gray-800 flex flex-col justify-center items-center p-4 text-center">
                            <span id="captionDisplay" class="text-yellow-400 font-bold text-2xl" style="text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;">
                                [Caption]
                            </span>
                        </div>
                    </div>
                </div>

                <!-- SRT Output -->
                <div class="flex-1 bg-gray-900 border border-gray-700 rounded-lg flex flex-col shadow-xl">
                    <div class="border-b border-gray-700 p-3 bg-gray-800 rounded-t-lg flex justify-between items-center">
                        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">SRT Editor</h3>
                        <i class="fas fa-edit text-gray-500 cursor-pointer hover:text-white"></i>
                    </div>
                    <div id="srtOutput" class="flex-1 p-4 overflow-y-auto custom-scrollbar font-mono text-sm text-gray-300">
                        <div class="text-gray-500 italic text-center mt-10">Captions will appear here...</div>
                    </div>
                </div>

            </div>
            
        </main>
    </div>

    <script src="main_app.js"></script>
</body>
</html>
